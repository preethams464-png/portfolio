<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtistGram</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
header {
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 20px;
  border-bottom: 1px solid #222;
}

/* PROFILE */
.profile {
  text-align: center;
  padding: 15px;
}

.profile img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

/* UPLOAD */
.upload {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input, textarea, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  background: #222;
  cursor: pointer;
}

button:hover {
  background: #333;
}

/* POSTS */
.feed {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 10px;
}

.post {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}

.post img {
  width: 100%;
  cursor: pointer;
}

.post-content {
  padding: 10px;
}

.actions {
  display: flex;
  gap: 15px;
  margin-top: 5px;
  font-size: 14px;
  cursor: pointer;
}

/* PREVIEW */
.preview {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

.preview img {
  max-width:90%;
  max-height:90%;
}

/* COMMENTS */
.comments {
  font-size: 13px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>🎨 ArtistGram</header>

<div class="profile">
  <img src="https://via.placeholder.com/80">
  <h3>Preetham.artx</h3>
  <p>Digital Artist ✏️</p>

  <div class="stats">
    <div><b id="postCount">0</b><br>Posts</div>
    <div><b>1.2K</b><br>Followers</div>
    <div><b>150</b><br>Following</div>
  </div>
</div>

<div class="upload">
  <input type="file" id="file">
  <textarea id="caption" placeholder="Write a caption..."></textarea>
  <select id="category">
    <option value="sketch">Sketch</option>
    <option value="anime">Anime</option>
    <option value="digital">Digital</option>
  </select>
  <button onclick="uploadPost()">Post</button>
</div>

<div class="feed" id="feed"></div>

<div class="preview" id="preview" onclick="closePreview()">
  <img id="previewImg">
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function save() {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function uploadPost() {
  let file = document.getElementById("file").files[0];
  let caption = document.getElementById("caption").value;
  let category = document.getElementById("category").value;

  if (!file) return alert("Select image");

  let reader = new FileReader();
  reader.onload = function(e) {
    posts.unshift({
      img: e.target.result,
      caption,
      category,
      likes: 0,
      comments: []
    });
    save();
    displayPosts();
  };
  reader.readAsDataURL(file);
}

function displayPosts() {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  document.getElementById("postCount").innerText = posts.length;

  posts.forEach((post, i) => {
    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <img src="${post.img}" onclick="openPreview('${post.img}')">
      <div class="post-content">
        <b>Preetham.artx</b>
        <p>${post.caption}</p>

        <div class="actions">
          <span onclick="like(${i})">❤️ ${post.likes}</span>
          <span onclick="addComment(${i})">💬 Comment</span>
        </div>

        <div class="comments">
          ${post.comments.map(c => `<p>${c}</p>`).join("")}
        </div>
      </div>
    `;

    feed.appendChild(div);
  });
}

function like(i) {
  posts[i].likes++;
  save();
  displayPosts();
}

function addComment(i) {
  let text = prompt("Enter comment:");
  if (!text) return;
  posts[i].comments.push(text);
  save();
  displayPosts();
}

function openPreview(src) {
  document.getElementById("preview").style.display = "flex";
  document.getElementById("previewImg").src = src;
}

function closePreview() {
  document.getElementById("preview").style.display = "none";
}

displayPosts();
</script>

</body>
</html>
